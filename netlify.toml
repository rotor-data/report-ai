[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Bundle the static assets folder so functions can read design-system.css etc.
  included_files = ["netlify/functions/assets/**"]

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5174
  functions = "netlify/functions"

[[redirects]]
  from = "/upload-ref"
  to = "/.netlify/functions/upload-ref"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
