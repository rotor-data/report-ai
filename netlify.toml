[build]
  # Layer 1 test-suite gates the deploy: lint + SQL audit + bundle-smoke
  # all run before the Vite build. If any fail, the deploy aborts.
  # See scripts/{lint-check,sql-syntax-check,bundle-smoke}.mjs.
  command = "npm run lint-check && npm run sql-syntax && npm run bundle-smoke && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Bundle the static assets folder so functions can read design-system.css etc.
  included_files = ["netlify/functions/assets/**"]

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5174
  functions = "netlify/functions"

[[redirects]]
  from = "/upload-ref"
  to = "/.netlify/functions/upload-ref"
  status = 200

[[redirects]]
  from = "/api/v2/content_units/*"
  to = "/.netlify/functions/v2-content-units/:splat"
  status = 200

[[redirects]]
  from = "/api/v2/units/suggestions"
  to = "/.netlify/functions/v2-units-suggestions"
  status = 200

[[redirects]]
  from = "/api/v2/units/apply-suggestions"
  to = "/.netlify/functions/v2-units-apply-suggestions"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
