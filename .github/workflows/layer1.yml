name: Layer 1 — pre-deploy gate

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  layer1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install eslint (Layer 1 dev tool, not in package.json)
        run: npm install --no-save eslint@^9

      - name: Lint + syntax check
        run: npm run lint-check

      - name: SQL migration audit
        run: npm run sql-syntax

      - name: Bundle smoke (functions load cleanly)
        run: npm run bundle-smoke
